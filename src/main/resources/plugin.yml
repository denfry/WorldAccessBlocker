name: WorldAccessBlocker
version: '${project.version}'
main: net.denfry.worldAccessBlocker.WorldAccessBlocker
api-version: '1.16'
load: STARTUP
authors: [ denfry ]
description: Plugin that blocks access to end, nether, elytra with enhanced features
folia-supported: true
softdepend: [PlaceholderAPI, WorldGuard]

commands:
  wabreload:
    description: "Reload the plugin configuration"
    permission: wab.reload
  wab:
    description: "Manage WorldAccessBlocker restrictions"
    permission: wab.bypass
    usage: "/wab <bypass|remove|list|clearexpired|status|stats|gui>"
permissions:
  wab.reload:
    description: "Allows reloading the config"
    default: op
  wab.bypass:
    description: "Allows bypassing restrictions"
    default: op
  wab.bypass.nether:
    description: "Allows bypassing Nether restrictions"
    default: op
  wab.bypass.end:
    description: "Allows bypassing End restrictions"
    default: op
  wab.bypass.elytra:
    description: "Allows bypassing Elytra restrictions"
    default: op
  wab.bypass.region:
    description: "Allows bypassing WorldGuard region blocks"
    default: op
  wab.status:
    description: "Allows checking restriction status"
    default: true
  wab.stats:
    description: "Allows viewing WAB stats"
    default: op
  wab.gui:
    description: "Allows opening WAB admin GUI"
    default: op
