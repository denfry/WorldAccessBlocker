name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog from tag message
        id: changelog
        run: |
          CHANGELOG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WorldAccessBlocker ${{ steps.version.outputs.VERSION }}"
          body: "${{ steps.changelog.outputs.CHANGELOG }}"
          files: target/worldaccessblocker-${{ steps.version.outputs.VERSION }}.jar

      - name: Upload to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          CHANGELOG: ${{ steps.changelog.outputs.CHANGELOG }}
        run: |
          JAR_PATH=$(find target -name "worldaccessblocker-*.jar" ! -name "original-*" | head -1)
          echo "Using JAR: $JAR_PATH"
          DATA=$(jq -n \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            '{
              "project_id": "worldaccessblocker",
              "version_number": $version,
              "name": ("WorldAccessBlocker " + $version),
              "changelog": $changelog,
              "dependencies": [],
              "game_versions": ["1.21.4"],
              "version_type": "release",
              "loaders": ["paper", "spigot", "bukkit", "folia"],
              "featured": true,
              "file_parts": ["file"]
            }')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "file=@${JAR_PATH}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
